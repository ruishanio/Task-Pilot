server:
  port: 8080

management:
  endpoints:
    web:
      base-path: /actuator
  health:
    mail:
      enabled: false

mybatis:
  mapper-locations: classpath:/mapper/*Mapper.xml

spring:
  main:
    banner-mode: off
  mvc:
    servlet:
      load-on-startup: 0
    static-path-pattern: /web/**
  web:
    resources:
      static-locations: classpath:/static/
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 10
      maximum-pool-size: 30
      auto-commit: true
      idle-timeout: 30000
      pool-name: HikariCP
      max-lifetime: 900000
      connection-timeout: 10000
      connection-test-query: SELECT 1
      validation-timeout: 1000
    url: "jdbc:postgresql://127.0.0.1:5432/task_pilot"
    username: postgres
    password: my-secret-pw
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    # 允许 Flyway 接管已存在但尚未纳入迁移历史的 schema，避免老库首次切换时直接失败。
    baseline-on-migrate: true
    # 统一约定管理端 migration 目录，避免后续资源路径调整时依赖默认扫描结果。
    locations: classpath:db/migration
    validate-on-migrate: true
  mail:
    host: smtp.qq.com
    port: 25
    username: xxx@qq.com
    from: xxx@qq.com
    password: xxx
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory

task-pilot:
  accessToken: default_token
  timeout: 3
  triggerpool:
    fast:
      max: 300
    slow:
      max: 200
  logretentiondays: 30
  auth:
    token:
      timeout: 604800000
    jwt:
      # 示例环境提供一把满足 HS256 长度要求的默认密钥，生产环境请务必改成外部注入的高强度密钥。
      secret: task-pilot-admin-jwt-secret-key-please-change-me-2026
