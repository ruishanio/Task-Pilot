spring:
  main:
    banner-mode: off

server:
  port: 8089

logging:
  config: classpath:logback.xml

task-pilot:
  admin:
    addresses: http://127.0.0.1:8080
    accessToken: default_token
    timeout: 3
  executor:
    enabled: true
    appname: task-pilot-executor-sample
    address: ""
    ip: "127.0.0.1"
    port: 9999
    logpath: ${user.home}/logs/task-pilot/taskhandler
    logretentiondays: 30
    excludedpackage: ""
  sync:
    enabled: true
